<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Estate Lead Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.3px; }
    header span { font-size: 1.5rem; }

    .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 28px;
      margin-bottom: 28px;
    }

    .card h2 { font-size: 1rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 20px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    @media (max-width: 820px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
    }

    label { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; font-weight: 500; color: #444; }

    input[type="text"], input[type="tel"], input[type="date"] {
      padding: 9px 12px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus { border-color: #4f6ef7; }

    .btn-add {
      background: #4f6ef7;
      color: white;
      border: none;
      padding: 9px 22px;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      height: 38px;
    }

    .btn-add:hover { background: #3a57d4; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .search-input {
      padding: 8px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      width: 240px;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: #4f6ef7; }

    .stats { font-size: 0.85rem; color: #888; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      border-bottom: 1.5px solid #eee;
    }

    tbody tr {
      border-bottom: 1px solid #f2f2f2;
      transition: background 0.1s;
    }

    tbody tr:hover { background: #f8f9ff; }

    td { padding: 13px 14px; font-size: 0.92rem; vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      background: #eef0ff;
      color: #4f6ef7;
    }

    .follow-up {
      font-size: 0.85rem;
      font-weight: 500;
    }

    .follow-up.overdue { color: #e53935; }
    .follow-up.today   { color: #f57c00; font-weight: 700; }
    .follow-up.soon    { color: #2e7d32; }
    .follow-up.future  { color: #555; }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .btn-delete:hover { color: #e53935; background: #fce8e8; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #aaa;
      font-size: 0.95rem;
    }

    .empty-state div { font-size: 2.5rem; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <span>🏡</span>
  <h1>Real Estate Lead Tracker</h1>
</header>

<div class="container">

  <!-- Add Lead Form -->
  <div class="card">
    <h2>Add New Lead</h2>
    <div class="form-grid">
      <label>
        Client Name
        <input type="text" id="inp-name" placeholder="Jane Smith" />
      </label>
      <label>
        Phone Number
        <input type="tel" id="inp-phone" placeholder="(555) 000-0000" />
      </label>
      <label>
        Neighborhood
        <input type="text" id="inp-neighborhood" placeholder="Downtown, Midtown..." />
      </label>
      <label>
        Follow-up Date
        <input type="date" id="inp-date" />
      </label>
      <button class="btn-add" onclick="addLead()">+ Add Lead</button>
    </div>
  </div>

  <!-- Leads Table -->
  <div class="card">
    <div class="toolbar">
      <h2 style="margin:0">Leads</h2>
      <div style="display:flex;gap:12px;align-items:center">
        <input class="search-input" type="text" id="search" placeholder="Search leads..." oninput="renderTable()" />
        <span class="stats" id="stats"></span>
      </div>
    </div>

    <table id="leads-table">
      <thead>
        <tr>
          <th>Client Name</th>
          <th>Phone</th>
          <th>Neighborhood</th>
          <th>Follow-up Date</th>
          <th>Added</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">
      <div>📋</div>
      No leads yet. Add one above!
    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = 'realestate_leads';

  function getLeads() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveLeads(leads) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
  }

  function addLead() {
    const name         = document.getElementById('inp-name').value.trim();
    const phone        = document.getElementById('inp-phone').value.trim();
    const neighborhood = document.getElementById('inp-neighborhood').value.trim();
    const followUp     = document.getElementById('inp-date').value;

    if (!name) { alert('Please enter a client name.'); return; }

    const leads = getLeads();
    leads.unshift({
      id: Date.now(),
      name,
      phone,
      neighborhood,
      followUp,
      added: new Date().toISOString().split('T')[0]
    });
    saveLeads(leads);

    // Clear form
    ['inp-name','inp-phone','inp-neighborhood','inp-date'].forEach(id => {
      document.getElementById(id).value = '';
    });

    renderTable();
  }

  function deleteLead(id) {
    if (!confirm('Remove this lead?')) return;
    saveLeads(getLeads().filter(l => l.id !== id));
    renderTable();
  }

  function followUpClass(dateStr) {
    if (!dateStr) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((d - today) / 86400000);
    if (diff < 0)  return 'overdue';
    if (diff === 0) return 'today';
    if (diff <= 3)  return 'soon';
    return 'future';
  }

  function followUpLabel(dateStr) {
    if (!dateStr) return '<span style="color:#ccc">—</span>';
    const cls = followUpClass(dateStr);
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((d - today) / 86400000);
    let suffix = '';
    if (diff < 0)   suffix = ` (${Math.abs(diff)}d overdue)`;
    if (diff === 0)  suffix = ' (Today)';
    if (diff > 0 && diff <= 3) suffix = ` (in ${diff}d)`;
    const formatted = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    return `<span class="follow-up ${cls}">${formatted}${suffix}</span>`;
  }

  function renderTable() {
    const query = document.getElementById('search').value.toLowerCase();
    const leads = getLeads().filter(l =>
      !query ||
      l.name.toLowerCase().includes(query) ||
      l.phone.toLowerCase().includes(query) ||
      l.neighborhood.toLowerCase().includes(query)
    );

    const tbody = document.getElementById('table-body');
    const empty = document.getElementById('empty-state');

    if (leads.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      document.getElementById('stats').textContent = '';
      return;
    }

    empty.style.display = 'none';
    const total = getLeads().length;
    document.getElementById('stats').textContent =
      query ? `${leads.length} of ${total} leads` : `${total} lead${total !== 1 ? 's' : ''}`;

    tbody.innerHTML = leads.map(l => `
      <tr>
        <td><strong>${escHtml(l.name)}</strong></td>
        <td>${l.phone ? escHtml(l.phone) : '<span style="color:#ccc">—</span>'}</td>
        <td>${l.neighborhood ? `<span class="badge">${escHtml(l.neighborhood)}</span>` : '<span style="color:#ccc">—</span>'}</td>
        <td>${followUpLabel(l.followUp)}</td>
        <td style="color:#aaa;font-size:0.82rem">${l.added}</td>
        <td><button class="btn-delete" onclick="deleteLead(${l.id})" title="Remove">✕</button></td>
      </tr>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && ['inp-name','inp-phone','inp-neighborhood','inp-date'].includes(e.target.id)) {
      addLead();
    }
  });

  renderTable();
</script>
</body>
</html>
